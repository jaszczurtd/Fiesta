name: ECU Tests

on:
  push:
    paths:
      - "src/ECU/**"
      - ".github/workflows/ecu-tests.yml"
  pull_request:
    paths:
      - "src/ECU/**"
      - ".github/workflows/ecu-tests.yml"
  workflow_dispatch:

jobs:
  test-ecu:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CANDEFINITIONS_REF: e88e6873d5d7553593db9b5f690430f2a74d9193
    permissions:
      contents: read

    steps:
      - name: Checkout Fiesta
        uses: actions/checkout@v5

      - name: Clone ECU dependencies
        run: |
          set -eux
          mkdir -p ../libraries

          git clone --depth 1 https://github.com/jaszczurtd/JaszczurHAL.git ../libraries/JaszczurHAL

          git init ../libraries/canDefinitions
          git -C ../libraries/canDefinitions remote add origin https://github.com/jaszczurtd/canDefinitions.git
          git -C ../libraries/canDefinitions fetch --depth 1 origin "$CANDEFINITIONS_REF"
          git -C ../libraries/canDefinitions checkout --detach FETCH_HEAD

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Configure
        run: |
          cmake -S src/ECU -B src/ECU/build_test -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build src/ECU/build_test --parallel

      - name: Run tests
        run: |
          ctest --test-dir src/ECU/build_test --output-on-failure
