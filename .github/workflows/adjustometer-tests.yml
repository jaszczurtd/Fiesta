name: Adjustometer Tests

on:
  push:
    paths:
      - "src/Adjustometer/**"
      - ".github/workflows/adjustometer-tests.yml"
  pull_request:
    paths:
      - "src/Adjustometer/**"
      - ".github/workflows/adjustometer-tests.yml"
  workflow_dispatch:

jobs:
  test-adjustometer:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - name: Checkout Fiesta
        uses: actions/checkout@v5

      - name: Clone Adjustometer dependencies
        run: |
          set -eux
          mkdir -p ../libraries

          git clone --depth 1 https://github.com/jaszczurtd/JaszczurHAL.git ../libraries/JaszczurHAL

      - name: Install analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind clang-tidy clang-tools

      - name: Configure
        run: |
          cmake -S src/Adjustometer -B src/Adjustometer/build_test \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build src/Adjustometer/build_test --parallel

      - name: Run tests
        run: ctest --test-dir src/Adjustometer/build_test --output-on-failure

      - name: Run Valgrind memcheck target
        run: cmake --build src/Adjustometer/build_test --target check-valgrind --parallel

      - name: Run clang-tidy target
        run: cmake --build src/Adjustometer/build_test --target check-clang-tidy --parallel
