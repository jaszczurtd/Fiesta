name: Firmware Build Scripts

on:
  push:
    paths:
      - "src/ECU/**"
      - "src/Clocks/**"
      - "src/OilAndSpeed/**"
      - "src/Adjustometer/**"
      - "src/Fiesta_clock/**"
      - "src/common/cmake/**"
      - "src/common/scripts/**"
      - ".github/workflows/firmware-build-scripts.yml"
  pull_request:
    paths:
      - "src/ECU/**"
      - "src/Clocks/**"
      - "src/OilAndSpeed/**"
      - "src/Adjustometer/**"
      - "src/Fiesta_clock/**"
      - "src/common/cmake/**"
      - "src/common/scripts/**"
      - ".github/workflows/firmware-build-scripts.yml"
  workflow_dispatch:

jobs:
  verify-build-scripts:
    name: Verify firmware workflow (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - ECU
          - Clocks
          - OilAndSpeed
          - Adjustometer
          - Fiesta_clock
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARDUINO_BOARD_URL: https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
      ARDUINO_CORE: rp2040:rp2040@5.4.0
    permissions:
      contents: read

    steps:
      - name: Checkout Fiesta
        uses: actions/checkout@v5

      - name: Clone firmware dependencies
        run: |
          set -eux
          mkdir -p ../libraries

          git clone --depth 1 https://github.com/jaszczurtd/JaszczurHAL.git ../libraries/JaszczurHAL

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install rp2040 core
        run: |
          set -eux
          arduino-cli core update-index --additional-urls "$ARDUINO_BOARD_URL"
          arduino-cli core install "$ARDUINO_CORE" --additional-urls "$ARDUINO_BOARD_URL"

      - name: Verify release build
        working-directory: src/${{ matrix.module }}
        run: |
          set -eux
          ../../../libraries/JaszczurHAL/vscode/entry/jh-vscode build --project "$PWD"

      - name: Verify debug build
        working-directory: src/${{ matrix.module }}
        run: |
          set -eux
          ../../../libraries/JaszczurHAL/vscode/entry/jh-vscode build-debug --project "$PWD"

      - name: Verify IntelliSense refresh
        working-directory: src/${{ matrix.module }}
        run: |
          set -eux
          ../../../libraries/JaszczurHAL/vscode/entry/jh-vscode refresh-intellisense --project "$PWD"
