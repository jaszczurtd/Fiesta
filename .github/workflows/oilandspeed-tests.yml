name: OilAndSpeed Tests

on:
  push:
    paths:
      - "src/OilAndSpeed/**"
      - ".github/workflows/oilandspeed-tests.yml"
  pull_request:
    paths:
      - "src/OilAndSpeed/**"
      - ".github/workflows/oilandspeed-tests.yml"
  workflow_dispatch:

jobs:
  test-oilandspeed:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - name: Checkout Fiesta
        uses: actions/checkout@v5

      - name: Clone OilAndSpeed dependencies
        run: |
          set -eux
          mkdir -p ../libraries

          git clone --depth 1 https://github.com/jaszczurtd/JaszczurHAL.git ../libraries/JaszczurHAL

      - name: Configure
        run: |
          cmake -S src/OilAndSpeed -B src/OilAndSpeed/build_test -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build src/OilAndSpeed/build_test --parallel

      - name: Run tests
        run: |
          ctest --test-dir src/OilAndSpeed/build_test --output-on-failure
